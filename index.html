<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>クリックゲーム</title>
</head>
<body>

  <h1>1分間クリックゲーム</h1>

  <!-- スコアとタイマーの表示 -->
  <p>クリック数: <span id="count">0</span></p>
  <p>残り時間: <span id="timer">60</span>秒</p>

  <!-- クリックボタン -->
  <button id="click-btn">クリック！</button>

  <!-- ゲームスタートボタン -->
  <button id="start-btn">スタート</button>

  <!-- ランキング表示エリア -->
  <h2>ランキング</h2>
  <ol id="ranking"></ol>

</body>
</html>
