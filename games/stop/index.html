<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>10秒ストップゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>10秒ストップゲーム</h1>
  <div id="wrapper">

  <!-- スコアとタイマーの表示 -->
    <div id="game-area">
         <p>
            <span id="seconds" class="time">00</span>秒
            <span id="milliseconds" class="time">000</span>
        </p>

        <!-- ゲームスタート/ストップ/リセットボタン -->
        <button id="start-btn">スタート</button>
        <button id="stop-btn">ストップ</button>
        <button id="reset-btn">リセット</button>
    </div>

  <!-- ランキング表示エリア -->
    <div id="ranking-area">
        <h2>ランキング</h2>
        <ol id="ranking"></ol>
    </div>
  </div>
 <script src="script.js"></script>
</body>
</html>
